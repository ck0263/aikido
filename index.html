<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AIKIDO KI-Arena</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
:root {
  --bg:#fafaf9;--surface:#fff;--surface-2:#f5f4f2;--border:#e8e6e3;
  --text:#1a1a1a;--text-dim:#6b6560;--text-faint:#a09a93;--red:#C8102E;
  --claude:#D97757;--gemini:#4285F4;--chatgpt:#10A37F;--perplexity:#20B2AA;--mistral:#FF7000;
  --font:'Montserrat',-apple-system,sans-serif;--radius:12px;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:var(--font);background:var(--bg);color:var(--text);line-height:1.6;font-size:14px;-webkit-font-smoothing:antialiased;padding-bottom:70px;}
.container{max-width:640px;margin:0 auto;padding:0 1.25rem;}
@media(min-width:768px){.container{max-width:840px;} body{padding-bottom:0;}}

/* Progress */
.top-bar{position:sticky;top:0;z-index:50;background:var(--bg);border-bottom:1px solid var(--border);}
.progress{display:flex;gap:4px;padding:1rem 0 0;}
.progress-step{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer;}
.progress-bar{height:3px;width:100%;border-radius:2px;background:var(--border);transition:background .4s;}
.progress-bar.active{background:var(--text);}
.progress-label{font-size:9px;font-weight:500;color:var(--text-faint);}
.progress-label.active{color:var(--text);font-weight:600;}
.progress-timer{font-size:9px;color:var(--text-faint);text-align:right;padding:2px 0 0;}

/* Tab/Section Nav */
.tab-bar{display:flex;border-bottom:none;padding:6px 0 8px;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;gap:2px;}
.tab-bar::-webkit-scrollbar{display:none;}
.tab-bar .tab{padding:6px 14px;font-size:11px;font-weight:600;color:var(--text-faint);border-bottom:2px solid transparent;cursor:pointer;white-space:nowrap;transition:all .2s;flex-shrink:0;}
.tab-bar .tab.active{color:var(--text);border-bottom-color:var(--text);}
.tab-bar .tab.locked{color:var(--border);cursor:default;}
.tab-bar .tab.done{color:var(--text-dim);}
.tab-bar .tab.finale{color:var(--red);}
.tab-bar .tab.finale.active{border-bottom-color:var(--red);}

/* Sections */
.act-content{padding:0 0 2rem;}
.section{margin-bottom:2rem;scroll-margin-top:100px;}
.section-divider{border:none;border-top:1px solid var(--border);margin:0 0 1.5rem;}

/* Locked section blur */
.section-locked{position:relative;margin-bottom:1.5rem;scroll-margin-top:100px;}
.section-locked .lock-overlay{position:relative;z-index:2;background:var(--surface);border:1px dashed var(--border);border-radius:var(--radius);padding:12px 16px;margin-bottom:8px;}
.lock-overlay .lock-title{font-size:13px;font-weight:600;color:var(--text-faint);display:flex;align-items:center;gap:6px;}
.lock-overlay .lock-desc{font-size:11px;color:var(--text-faint);margin-top:2px;}
.section-locked .blur-preview{filter:blur(4px) opacity(0.4);pointer-events:none;user-select:none;max-height:120px;overflow:hidden;}

/* Typography */
.act-label{font-size:11px;font-weight:600;letter-spacing:.15em;text-transform:uppercase;color:var(--text-faint);margin-bottom:4px;}
h2{font-size:22px;font-weight:600;margin-bottom:4px;}
.subtitle{font-size:14px;color:var(--text-dim);margin-bottom:1.25rem;line-height:1.5;}

/* Inputs */
textarea,input[type="text"]{width:100%;font-family:var(--font);font-size:14px;padding:12px 14px;border-radius:var(--radius);border:1px solid var(--border);background:var(--surface);resize:vertical;outline:none;}
textarea:focus,input[type="text"]:focus{border-color:var(--text-dim);}

/* Buttons */
.btn{width:100%;padding:12px;border-radius:var(--radius);font-family:var(--font);font-weight:600;font-size:14px;border:none;cursor:pointer;transition:all .15s;}
.btn-primary{background:var(--text);color:var(--bg);}
.btn-primary:hover{opacity:.9;}
.btn-primary:disabled{background:var(--border);color:var(--text-faint);cursor:default;}
.btn-secondary{background:var(--surface);color:var(--text);border:1px solid var(--border);}
.btn-skip{background:none;border:none;color:var(--text-dim);font-family:var(--font);font-size:13px;font-weight:500;cursor:pointer;padding:8px 0;width:100%;text-align:center;}
.btn-back{background:none;border:none;color:var(--text-dim);font-family:var(--font);font-size:13px;cursor:pointer;padding:4px 0;margin-bottom:8px;}

/* Cards */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:1rem;margin-bottom:10px;}
.result-text{font-size:13px;line-height:1.65;white-space:pre-wrap;}

/* Tool badge */
.tool-badge{display:inline-flex;align-items:center;gap:6px;font-weight:600;font-size:13px;margin-bottom:8px;}
.tool-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;}

/* Chips & Pills */
.chip-row{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:8px;}
.chip{padding:6px 12px;border-radius:8px;font-size:12px;background:var(--surface-2);border:1px solid var(--border);cursor:pointer;transition:all .15s;user-select:none;}
.chip:hover{border-color:var(--text-dim);}
.chip.active{background:var(--text);color:var(--bg);border-color:var(--text);}
.pill-row{display:flex;gap:5px;flex-wrap:wrap;}
.pill{padding:8px 16px;border-radius:20px;font-size:13px;font-weight:500;border:1px solid var(--border);background:var(--surface);cursor:pointer;transition:all .15s;user-select:none;}
.pill:hover{border-color:var(--text-dim);}
.pill.active{background:var(--text);color:var(--bg);border-color:var(--text);}

/* Insight boxes */
.insight{padding:14px 16px;border-radius:var(--radius);background:var(--surface-2);margin-bottom:12px;}
.insight p{font-size:14px;font-weight:500;margin:0;line-height:1.5;}
.insight.green{background:linear-gradient(135deg,#f0fdf4,#ecfdf5);border:1px solid #bbf7d0;}
.insight.yellow{background:linear-gradient(135deg,#fef9c3,#fef3c7);border:1px solid #fde68a;}
.insight.yellow p{color:#92400e;}
.insight.pink{background:linear-gradient(135deg,#fdf2f2,#fff5f5);border-left:3px solid var(--red);}

/* Tool btns */
.btn-tool{padding:8px 14px;border-radius:8px;font-size:13px;font-weight:500;border:1px solid var(--border);background:var(--surface);cursor:pointer;transition:all .15s;font-family:var(--font);}
.btn-tool.selected{color:#fff;border-color:transparent;}

/* Context grid */
.context-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:12px 0;}
@media(max-width:500px){.context-grid{grid-template-columns:1fr;}}
.ctx-card{border-radius:var(--radius);padding:14px;border:1px solid var(--border);}
.ctx-card .ctx-label{font-size:10px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;margin-bottom:6px;}
.ctx-card .ctx-prompt{font-size:11px;color:var(--text-dim);line-height:1.5;padding:8px 10px;border-radius:6px;background:var(--surface-2);margin-bottom:8px;font-style:italic;}
.ctx-card.naked{background:var(--surface);}
.ctx-card.naked .ctx-label{color:var(--text-faint);}
.ctx-card.tuned{background:linear-gradient(135deg,#f0fdf4,#ecfdf5);border-color:#bbf7d0;}
.ctx-card.tuned .ctx-label{color:#16a34a;}

/* Tool grid (desktop) */
.tool-grid{display:flex;flex-direction:column;gap:10px;}
@media(min-width:768px){.tool-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;}}
.tool-grid-card{background:var(--surface);border:2px solid var(--border);border-radius:var(--radius);padding:14px;cursor:pointer;transition:all .2s;text-align:center;}
.tool-grid-card:hover{border-color:var(--text-dim);}
.tool-grid-card.active{border-width:2px;}
.tool-grid-card .tg-emoji{font-size:24px;margin-bottom:4px;}
.tool-grid-card .tg-name{font-size:13px;font-weight:700;}
.tool-grid-card .tg-vibe{font-size:10px;color:var(--text-dim);}

/* Tool detail (expanded below grid) */
.tool-detail{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-top:10px;}
.tool-detail .td-header{display:flex;align-items:center;gap:10px;margin-bottom:10px;}
.tool-detail .td-icon{width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:20px;}
.tool-detail .td-body{font-size:12px;line-height:1.6;color:var(--text-dim);}
.tool-detail .td-body strong{color:var(--text);}

/* Reflect */
.reflect-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:12px;margin-bottom:8px;}
.reflect-card .rq{font-size:12px;font-weight:500;margin-bottom:8px;border-left:2px solid #8B5CF6;padding-left:8px;}
.reflect-card .rq-btns{display:flex;gap:6px;flex-wrap:wrap;}
.reflect-card .rq-btn{flex:1;padding:7px;border-radius:8px;font-size:11px;font-weight:500;border:1px solid var(--border);background:var(--surface);cursor:pointer;text-align:center;font-family:var(--font);transition:all .15s;min-width:fit-content;}
.reflect-card .rq-btn.picked{background:var(--text);color:var(--bg);border-color:var(--text);}
@media(max-width:500px){.reflect-card .rq-btns{flex-direction:column;}}

/* Full-screen overlay */
.overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:#1a1a1a;z-index:200;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .4s;}
.overlay.show{opacity:1;pointer-events:all;}
.overlay-content{max-width:400px;padding:2rem;text-align:center;color:#fff;}
.overlay-content .ov-emoji{font-size:56px;margin-bottom:16px;}
.overlay-content h2{font-size:24px;color:#fff;margin-bottom:8px;}
.overlay-content .ov-sub{font-size:15px;color:rgba(255,255,255,.5);margin-bottom:24px;line-height:1.6;}
.overlay-content .ov-insight{background:rgba(255,255,255,.08);border-radius:var(--radius);padding:14px;margin-bottom:24px;font-size:13px;color:rgba(255,255,255,.7);line-height:1.6;text-align:left;}
.overlay-content .ov-insight strong{color:#fff;}
.overlay-content .btn{max-width:280px;margin:0 auto;}

/* Tier */
.tier-toggle{display:flex;border-radius:10px;overflow:hidden;border:1px solid var(--border);background:var(--surface-2);margin:8px 0;}
.tier-option{flex:1;padding:10px;text-align:center;cursor:pointer;transition:all .2s;position:relative;}
.tier-option .tier-name{font-size:13px;font-weight:600;}
.tier-option.active{background:var(--surface);box-shadow:0 1px 4px rgba(0,0,0,.08);}
.tier-option.recommended::after{content:"empfohlen";position:absolute;top:-8px;right:8px;font-size:9px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;padding:2px 6px;border-radius:4px;}
.tier-features{list-style:none;padding:0;margin:8px 0;}
.tier-features li{font-size:12px;line-height:1.8;color:var(--text-dim);padding-left:18px;position:relative;}
.tier-features li::before{content:"\2713";position:absolute;left:0;color:#22c55e;font-weight:700;}

/* HORSCH info */
.horsch-info{border-radius:var(--radius);padding:16px;margin-bottom:14px;background:linear-gradient(135deg,#fdf2f2,#fff5f5);border-left:3px solid var(--red);}
.horsch-info .hi-title{font-size:14px;font-weight:700;margin-bottom:6px;}
.horsch-info .hi-body{font-size:13px;color:var(--text-dim);line-height:1.7;}
.horsch-info .hi-body strong{color:var(--text);}
.horsch-info .hi-tags{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px;}
.horsch-info .hi-tag{font-size:11px;padding:3px 8px;border-radius:6px;background:rgba(200,16,46,.06);color:var(--text-dim);}

/* Setup card */
.setup-card{background:linear-gradient(135deg,#1a1a1a,#2d2d2d);border-radius:16px;padding:1.5rem;color:#fff;position:relative;overflow:hidden;}
.setup-card .accent-blob{position:absolute;top:0;right:0;width:120px;height:120px;opacity:.12;border-radius:0 16px 0 120px;}

/* Desktop 2-col */
.desktop-split{display:block;}
@media(min-width:768px){.desktop-split{display:grid;grid-template-columns:1fr 1fr;gap:20px;align-items:start;}}

/* Starter */
.starter-box{background:var(--surface);border:2px dashed var(--border);border-radius:var(--radius);padding:1rem;margin:10px 0;position:relative;}
.starter-box .copy-btn{position:absolute;top:8px;right:8px;background:var(--text);color:var(--bg);border:none;border-radius:6px;padding:4px 10px;font-size:11px;font-family:var(--font);font-weight:600;cursor:pointer;}

/* Challenge */
.challenge-card{background:var(--surface);border:2px solid var(--red);border-radius:var(--radius);padding:16px;margin:12px 0;}
.challenge-card .ch-label{font-size:9px;font-weight:700;color:var(--red);letter-spacing:.1em;text-transform:uppercase;margin-bottom:4px;}
.challenge-card .ch-title{font-size:14px;font-weight:600;margin-bottom:6px;}
.challenge-card .ch-body{font-size:12px;color:var(--text-dim);line-height:1.6;}
.challenge-card .ch-example{background:var(--surface-2);border-radius:8px;padding:8px;margin-top:8px;font-size:11px;color:var(--text-dim);font-style:italic;}
.timer-badge{display:inline-flex;align-items:center;gap:6px;background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:6px 14px;font-size:12px;font-weight:600;margin:8px 0;}
.success-box{background:linear-gradient(135deg,#f0fdf4,#ecfdf5);border:1px solid #bbf7d0;border-radius:var(--radius);padding:14px;text-align:center;margin:10px 0;}

/* Step flow */
.step-item{display:flex;gap:12px;align-items:flex-start;margin-bottom:14px;}
.step-num{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;flex-shrink:0;}
.step-num.active{background:var(--text);color:#fff;}
.step-num.pending{background:var(--border);color:var(--text-dim);}
.step-info{flex:1;}
.step-info .si-title{font-size:13px;font-weight:600;}
.step-info .si-desc{font-size:11px;color:var(--text-dim);margin-top:2px;}

/* Sticky CTA mobile */
.sticky-cta{display:none;}
@media(max-width:767px){
  .sticky-cta{display:block;position:fixed;bottom:0;left:0;right:0;padding:10px 16px;background:linear-gradient(transparent,var(--bg) 30%);z-index:40;}
  .sticky-cta .btn{box-shadow:0 -2px 12px rgba(0,0,0,.1);}
}

/* Onboarding dots */
.onboard-dots{display:flex;gap:6px;margin-bottom:1.5rem;justify-content:center;}
.onboard-dot{width:8px;height:8px;border-radius:50%;background:var(--border);transition:all .3s;}
.onboard-dot.active{background:var(--text);width:24px;border-radius:4px;}
.onboard-dot.done{background:var(--text);}

/* Deep link */
.deep-link{display:inline-flex;align-items:center;gap:4px;font-size:12px;font-weight:500;text-decoration:none;padding:4px 10px;border-radius:6px;border:1px solid var(--border);margin-top:6px;cursor:pointer;font-family:var(--font);}

/* Spinner */
.spinner{display:inline-flex;align-items:center;gap:8px;color:var(--text-faint);font-style:italic;font-size:13px;}
.spinner::before{content:"";width:14px;height:14px;border:2px solid var(--border);border-top-color:var(--text-dim);border-radius:50%;animation:spin .7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}

/* Fallback */
.tool-fallback{display:flex;align-items:center;gap:12px;padding:12px;border-radius:8px;background:var(--surface-2);margin-top:6px;}
.tool-fallback .tool-icon{width:36px;height:36px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;}
.tool-fallback .tool-info{flex:1;}
.tool-fallback .tool-info .name{font-weight:600;font-size:13px;}
.tool-fallback .tool-info .desc{font-size:11px;color:var(--text-dim);}
.tool-fallback .try-link{font-size:12px;font-weight:600;text-decoration:none;padding:6px 12px;border-radius:6px;white-space:nowrap;}

/* Animations */
@keyframes fadeUp{from{opacity:0;transform:translateY(12px);}to{opacity:1;transform:translateY(0);}}
.fade-up{animation:fadeUp .35s ease-out both;}

/* Confetti */
@keyframes confetti-fall{0%{transform:translateY(-20px) rotate(0);opacity:1;}100%{transform:translateY(500px) rotate(720deg);opacity:0;}}
.confetti-wrap{position:fixed;top:0;left:0;right:0;bottom:0;pointer-events:none;z-index:100;overflow:hidden;}
.confetti{position:absolute;border-radius:2px;animation:confetti-fall 3s ease-out forwards;}

/* High Five */
.high-five{text-align:center;padding:3rem 1rem;}
.hf-emoji{font-size:64px;margin-bottom:16px;}
@keyframes hf-bounce{0%{transform:scale(0);}60%{transform:scale(1.2);}100%{transform:scale(1);}}
.hf-bounce{animation:hf-bounce .6s ease-out;}
.hf-title{font-size:28px;font-weight:800;margin-bottom:8px;}
.hf-sub{font-size:16px;color:var(--text-dim);line-height:1.6;max-width:320px;margin:0 auto 24px;}

/* Werkzeugkoffer */
.wk-toggle{text-align:center;margin:1.5rem 0;}
.wk-toggle button{background:none;border:2.5px solid var(--red);border-radius:24px;padding:12px 28px;font-family:var(--font);font-size:14px;font-weight:700;color:var(--red);cursor:pointer;transition:all .2s;}
.wk-toggle button:hover{background:var(--red);color:#fff;}
.paket-grid-4{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin:12px 0;}
@media(max-width:600px){.paket-grid-4{grid-template-columns:repeat(2,1fr);}}
.paket-card-sm{background:var(--surface);border:2px solid var(--border);border-radius:var(--radius);padding:12px;text-align:center;cursor:pointer;transition:all .2s;position:relative;}
.paket-card-sm:hover{border-color:var(--text-dim);}
.paket-card-sm.selected{border-color:var(--text);}
.paket-card-sm .pk-emoji{font-size:22px;margin-bottom:4px;}
.paket-card-sm .pk-name{font-size:12px;font-weight:700;margin-bottom:1px;}
.paket-card-sm .pk-count{font-size:10px;color:var(--text-faint);}
.paket-card-sm .pk-tag{position:absolute;top:-7px;right:8px;background:var(--red);color:#fff;font-size:8px;font-weight:700;padding:1px 6px;border-radius:3px;}
.paket-card-sm.individuell{border-style:dashed;}
.paket-card-sm.individuell.selected{border-color:var(--claude);border-style:solid;background:#fdf8f6;}
.divider-text{text-align:center;font-size:11px;color:var(--text-faint);margin:14px 0 10px;position:relative;}
.divider-text::before,.divider-text::after{content:"";position:absolute;top:50%;width:28%;height:1px;background:var(--border);}
.divider-text::before{left:0;}.divider-text::after{right:0;}
.akk-cluster{border:1px solid var(--border);border-radius:var(--radius);margin-bottom:6px;overflow:hidden;background:var(--surface);}
.akk-header{padding:10px 14px;display:flex;justify-content:space-between;align-items:center;cursor:pointer;}
.akk-header:hover{background:var(--surface-2);}
.akk-header .ah-left{display:flex;align-items:center;gap:8px;}
.akk-header .ah-emoji{font-size:14px;}
.akk-header .ah-name{font-size:12px;font-weight:600;}
.akk-header .ah-count{font-size:10px;color:var(--text-faint);background:var(--surface-2);padding:1px 8px;border-radius:10px;}
.akk-header .ah-arrow{font-size:11px;color:var(--text-faint);transition:transform .2s;}
.akk-header.open .ah-arrow{transform:rotate(180deg);}
.akk-body{padding:0 12px 12px;display:none;}
.akk-body.open{display:block;}
.addon-card-full{display:flex;align-items:flex-start;gap:10px;padding:10px 12px;border-radius:10px;border:1.5px solid var(--border);background:var(--surface);cursor:pointer;transition:all .15s;margin-bottom:5px;user-select:none;}
.addon-card-full:hover{border-color:var(--text-dim);}
.addon-card-full.on{border-color:var(--text);}
.addon-card-full .acf-emoji{font-size:16px;flex-shrink:0;margin-top:1px;}
.addon-card-full .acf-info{flex:1;min-width:0;}
.addon-card-full .acf-name{font-size:12px;font-weight:600;}
.addon-card-full .acf-desc{font-size:10px;color:var(--text-dim);line-height:1.4;margin-top:1px;}
.addon-card-full .acf-toggle{width:18px;height:18px;border-radius:50%;border:2px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:10px;flex-shrink:0;margin-top:2px;transition:all .15s;}
.addon-card-full.on .acf-toggle{background:var(--text);border-color:var(--text);color:#fff;}
.info-btn{display:inline-flex;align-items:center;justify-content:center;width:18px;height:18px;border-radius:50%;border:1.5px solid var(--border);font-size:10px;font-weight:700;color:var(--text-faint);cursor:pointer;margin-left:6px;}
.info-tooltip{background:var(--text);color:#fff;border-radius:var(--radius);padding:14px;font-size:12px;line-height:1.6;margin:8px 0;display:none;}
.info-tooltip.show{display:block;}
.prompt-preview{background:var(--surface);border:2px dashed var(--border);border-radius:var(--radius);padding:16px;margin:14px 0;position:relative;}
.prompt-preview .pp-label{font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--text-faint);margin-bottom:8px;}
.prompt-preview .pp-text{font-size:11px;line-height:1.7;color:var(--text-dim);white-space:pre-wrap;}

/* ===== API ===== */
async function askAI(provider,prompt,system){
  try{
    const controller=new AbortController();
    const timeout=setTimeout(()=>controller.abort(),8000);
    const doFetch=async()=>{
      const res=await fetch(PROXY_URL,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({provider,prompt,system}),signal:controller.signal});
      return await res.json();
    };
    let data;
    if(provider==="gemini"){
      let lastErr=null;
      for(let attempt=0;attempt<3;attempt++){
        try{
          const c2=new AbortController();const t2=setTimeout(()=>c2.abort(),8000);
          const res=await fetch(PROXY_URL,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({provider,prompt,system}),signal:c2.signal});
          clearTimeout(t2);
          data=await res.json();
          if(!data.error)break;
          lastErr=data.error;
          if(attempt<2)await new Promise(r=>setTimeout(r,2000));
        }catch(e2){
          lastErr=e2.message;
          if(attempt<2)await new Promise(r=>setTimeout(r,2000));
        }
      }
      clearTimeout(timeout);
      if(!data||data.error){
        return{text:null,noKey:true,geminiDown:true};
      }
      if(data.error==="no_key")return{text:null,noKey:true};
      return{text:data.text,noKey:false};
    }
    data=await doFetch();
    clearTimeout(timeout);
    if(data.error==="no_key")return{text:null,noKey:true};
    if(data.error)return{text:"Fehler: "+data.error,noKey:false};
    return{text:data.text,noKey:false};
  }catch(e){return{text:null,noKey:true};}
}

  else if(currentAct===1&&dc>=1) label="\u23F1 ~3 Min";

  else if(currentAct===2&&dc>=3) label="Fast geschafft! \uD83C\uDFC1";

}

function renderTabBar(){
  if(currentAct<0){document.getElementById("tab-bar").innerHTML="";return;}
  const ss=sectionState[currentAct];
  document.getElementById("tab-bar").innerHTML=ss.sections.map(s=>{
    let cls="tab";
    if(ss.done[s])cls+=" done";
    if(ss.locked[s])cls+=" locked";
    if(s==="los"&&!ss.locked[s])cls+=" finale";
    const label=ss.done[s]?SECTION_LABELS[s]+" \u2713":ss.locked[s]?SECTION_LABELS[s]+" \uD83D\uDD12":SECTION_LABELS[s];
    return`<div class="${cls}" onclick="scrollToSection('${s}')">${label}</div>`;
  }).join("");
}

function scrollToSection(id){
  if(sectionState[currentAct].locked[id])return;
  document.getElementById("sec-"+id)?.scrollIntoView({behavior:"smooth",block:"start"});
}

function unlock(sec){sectionState[currentAct].locked[sec]=false;renderTabBar();renderAct();}
function markDone(sec){sectionState[currentAct].done[sec]=true;renderTabBar();updateTimer();}

function goToAct(n){
  currentAct=n;renderProgress();renderTabBar();renderAct();window.scrollTo({top:0,behavior:"smooth"});
}

function updateStickyCTA(text,action){
  stickyCTA={text,action};

/* ===== SCROLL SPY ===== */
function setupScrollSpy(){
  const tabs=document.querySelectorAll(".tab-bar .tab");
  const sections=sectionState[currentAct].sections;
  const observer=new IntersectionObserver(entries=>{
    entries.forEach(e=>{
      if(e.isIntersecting){
        const id=e.target.id.replace("sec-","");
        tabs.forEach(t=>{t.classList.remove("active");if(t.textContent.includes(SECTION_LABELS[id]))t.classList.add("active");});
      }
    });
  },{threshold:0.3,rootMargin:"-100px 0px 0px 0px"});
  sections.forEach(s=>{const el=document.getElementById("sec-"+s);if(el)observer.observe(el);});
}

  const t=TOOLS.find(x=>x.id===expandedTool);
  const pitch=window._tp?.[t.id];
  const promptText=contextPrompt||profile.task||"";
  const pH=pitch?.text&&!pitch?.noKey?`<div class="result-text" style="font-size:12px;">${esc(pitch.text)}</div>${renderToolLinkBtn(t,promptText)}`:pitch?.noKey?(pitch?.geminiDown?renderGeminiFallback():renderFallback(t)):`<div class="result-text" style="font-size:12px;">${renderLoading(t.name+" denkt nach...")}</div>`;
  return`<div class="tool-detail fade-up" style="border-left:3px solid ${t.color};">
    <div class="td-header"><div class="td-icon" style="background:${t.color}22;">${t.emoji}</div><div><div style="font-size:15px;font-weight:700;">${t.name}</div><div style="font-size:10px;color:var(--text-dim);">${t.vibe} \u00b7 ${t.by}</div></div></div>
    <div class="td-body"><strong>Stark bei:</strong> ${t.strengths}<br><strong>Weniger:</strong> ${t.weaker}</div>
    <div style="margin-top:10px;padding-top:10px;border-top:1px solid var(--border);">${pH}</div>
  </div>`;
}

function renderGeminiFallback(){
  const t=TOOLS.find(x=>x.id==="gemini");
  return`<div class="tool-fallback"><div class="tool-icon" style="background:${t.color}22;">${t.emoji}</div><div class="tool-info"><div class="name">${t.name}</div><div class="desc">Gerade nicht erreichbar \u2014 direkt in Gemini ausprobieren.</div></div><a href="https://gemini.google.com" target="_blank" class="try-link" style="background:${t.color}18;color:${t.color};">In Gemini ausprobieren \u2192</a></div>`;
}

async function fireArena(){
  const p=document.getElementById("arena-in").value.trim();if(!p)return;
  const btn=document.getElementById("arena-go");btn.disabled=true;btn.textContent="Tools antworten...";
  const c=document.getElementById("arena-res");
  c.innerHTML=TOOLS.map(t=>`<div class="card mb" style="border-left:3px solid ${t.color};"><div class="tool-badge"><span class="tool-dot" style="background:${t.color};"></span>${t.name}</div><div id="ar-${t.id}">${renderLoading(t.name+"...")}</div></div>`).join("");
  const res=await Promise.all(TOOLS.map(t=>askAI(t.id,p,contextPrompt+" Antworte auf Deutsch. Max 150 W\u00f6rter.").then(r=>({id:t.id,...r}))));
  res.forEach(r=>{
    const t=TOOLS.find(x=>x.id===r.id);
    if(r.noKey||!r.text){
      if(r.geminiDown){
        document.getElementById("ar-"+r.id).innerHTML=renderGeminiFallback();
      }else{
        document.getElementById("ar-"+r.id).innerHTML=renderFallback(t,p);
      }
    }else{
      document.getElementById("ar-"+r.id).innerHTML=`<div class="result-text">${esc(r.text)}</div>${renderToolLinkBtn(t,p)}`;
    }
  });
  btn.textContent="Nochmal fragen";btn.disabled=false;
}

    <button onclick="renderAct1(document.getElementById('act-content'))" style="background:none;border:1px solid var(--border);border-radius:8px;padding:6px 14px;font-size:12px;font-family:var(--font);color:var(--text-dim);cursor:pointer;">Andere Szenarien</button>
    <div id="grenz-loading"></div>
  </div><hr class="section-divider">`;

  if(ss.locked.reflexion){
    html+=lockedHTML("reflexion","W\u00e4hle oben ein Szenario \u2014 dann antwortet die KI",`<div class="reflect-card"><div class="rq">H\u00e4ttest du das so gesagt?</div><div class="rq-btns"><div class="rq-btn">Ja</div><div class="rq-btn">Anders</div></div></div>`);
  } else {
    const limit=LIMITS[selectedLimitIdx];
    const ans=window._limitAns;
    const aH=ans?.text&&!ans?.noKey?`<div class="result-text" style="font-size:12px;">${esc(ans.text)}</div>`:"";
    // Multi-select question detection: question index 1 ("Was weiss die KI nicht?") is multi-select
    const isMultiQ=(qi)=>qi===1;
    const allDone=reflectAnswers.every((a,i)=>{
      if(isMultiQ(i)){return Array.isArray(a)&&a.length>0;}
      return a!==null;
    });
    html+=`<div class="section" id="sec-reflexion">
      <div class="card mb" style="border-left:3px solid var(--claude);"><div class="tool-badge"><span class="tool-dot" style="background:var(--claude);"></span>Claude antwortet</div>${aH}</div>
      <div class="insight mb"><p>Die Antwort klingt gut. Aber frag dich:</p></div>
      ${limit.reflect.map((rq,i)=>{
        if(isMultiQ(i)){
          // Multi-select chips
          const sel=Array.isArray(reflectAnswers[i])?reflectAnswers[i]:[];
          return`<div class="reflect-card"><div class="rq">${rq[0]} <span style="font-size:10px;color:var(--text-faint);">(Mehrfachauswahl)</span></div><div class="rq-btns">${rq.slice(1).map((o,j)=>`<div class="rq-btn ${sel.includes(j)?'picked':''}" onclick="toggleMultiReflect(${i},${j})">${o}</div>`).join("")}</div></div>`;
        }else{
          return`<div class="reflect-card"><div class="rq">${rq[0]}</div><div class="rq-btns">${rq.slice(1).map((o,j)=>`<div class="rq-btn ${reflectAnswers[i]===j?'picked':''}" onclick="reflectAnswers[${i}]=${j};renderAct();">${o}</div>`).join("")}</div></div>`;
        }
      }).join("")}
      <button class="btn btn-primary mt" ${allDone?'':'disabled'} onclick="showOverlay('\uD83C\uDFAF','KI denkt mit \u2014\\ndu entscheidest.','Das macht dich nicht \u00fcberfl\u00fcssig.<br>Das macht dich zum Piloten.','${limit.insight.replace(/'/g,"\\'")}','Weiter \u2014 Mein Setup',()=>{markDone('reflexion');goToAct(2);})">Mein Fazit</button>
    </div>`;
  }
  el.innerHTML=html;
  updateStickyCTA("","");
}

function toggleMultiReflect(qi,val){
  if(!Array.isArray(reflectAnswers[qi]))reflectAnswers[qi]=[];
  const idx=reflectAnswers[qi].indexOf(val);
  if(idx>=0)reflectAnswers[qi].splice(idx,1);
  else reflectAnswers[qi].push(val);
  renderAct();
}

let usedLimits=new Set();
function pickThree(){let a=LIMITS.map((_,i)=>i).filter(i=>!usedLimits.has(i));if(a.length<3){usedLimits.clear();a=LIMITS.map((_,i)=>i);}for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}const r=a.slice(0,3);r.forEach(i=>usedLimits.add(i));return r;}

async function selectLimit(idx){
  selectedLimitIdx=idx;reflectAnswers=[null,null,null];
  // Reset multi-select question to empty array
  reflectAnswers[1]=[];
  document.querySelectorAll("[id^='gc-']").forEach(c=>{c.style.opacity=c.id==="gc-"+idx?"1":"0.3";c.style.cursor="default";c.onclick=null;});
  document.getElementById("grenz-loading").innerHTML=renderLoading("KI antwortet...");
  const r=await askAI("claude",LIMITS[idx].q,"Antworte auf Deutsch, kompetent. Gib eine gute Antwort. Max 150 W\u00f6rter.");
  window._limitAns=r;
  markDone("szenario");unlock("reflexion");
  renderAct();
  setTimeout(()=>scrollToSection("reflexion"),300);
}

async function pickPrimary(id){
  setupData.primary=id;setupData.primaryTier="free";
  window._toolConf="loading";renderAct();
  const t=TOOLS.find(x=>x.id===id);
  const r=await askAI("claude","User w\u00e4hlte "+t.name+". Profil: "+contextPrompt+"\n\nKurze Best\u00e4tigung (3\u20134 S\u00e4tze): Warum passt "+t.name+"? Welches Zweit-Tool erg\u00e4nzt gut?","Auf Deutsch, warm, max 60 W\u00f6rter.");
  window._toolConf=r.text&&!r.noKey?r:{text:t.name+" passt gut zu dir \u2014 besonders f\u00fcr "+t.sweet+".",noKey:false};
  renderAct();setTimeout(()=>document.getElementById("sec-tool")?.scrollIntoView({behavior:"smooth",block:"start"}),200);
}

async function renderCardImage(){const c=document.getElementById("final-card");if(!c)return null;await document.fonts.ready;return html2canvas(c,{scale:2,backgroundColor:null,useCORS:true,logging:false});}
async function saveCard(b){b.textContent="...";b.disabled=true;try{const c=await renderCardImage();if(!c)return;const l=document.createElement("a");l.download="aikido-setup-"+(setupData.name||"k").replace(/\s+/g,"-").toLowerCase()+".png";l.href=c.toDataURL("image/png");l.click();b.textContent="Gespeichert!";setTimeout(()=>{b.textContent="Speichern";b.disabled=false;},2000);}catch(e){b.textContent="Speichern";b.disabled=false;}}
async function shareCard(){const b=document.getElementById("share-btn");b.textContent="...";b.disabled=true;try{const c=await renderCardImage();if(!c)return;c.toBlob(async bl=>{if(!bl)return;const f=new File([bl],"aikido-setup.png",{type:"image/png"});if(navigator.share&&navigator.canShare?.({files:[f]}))await navigator.share({title:"AIKIDO Setup",files:[f]});else{const l=document.createElement("a");l.download="aikido-setup.png";l.href=URL.createObjectURL(bl);l.click();}b.textContent="Teilen";b.disabled=false;},"image/png");}catch(e){b.textContent="Teilen";b.disabled=false;}}

function copyShareText(btn){
  const pri=TOOLS.find(x=>x.id===setupData.primary);

}

let selectedAddons = new Set(PACKAGES.macher);

/* ===== CONFETTI ===== */
function fireConfetti(){
  let w=document.getElementById("confetti-wrap");
  if(!w){w=document.createElement("div");w.className="confetti-wrap";w.id="confetti-wrap";document.body.appendChild(w);}
  const colors=["#C8102E","#D97757","#4285F4","#10A37F","#FF7000","#fde68a","#8B5CF6"];
  for(let i=0;i<50;i++){const c=document.createElement("div");c.className="confetti";c.style.left=Math.random()*100+"%";c.style.top="-10px";c.style.background=colors[Math.floor(Math.random()*colors.length)];c.style.animationDelay=Math.random()*1.5+"s";c.style.animationDuration=2+Math.random()*2+"s";c.style.width=6+Math.random()*6+"px";c.style.height=6+Math.random()*4+"px";w.appendChild(c);}
  setTimeout(()=>w.innerHTML="",5000);
}

function toggleAddon(id){
  if(selectedAddons.has(id)) selectedAddons.delete(id); else selectedAddons.add(id);
}

function applyPackage(pkg){
  selectedAddons = new Set(PACKAGES[pkg] || []);
}

function getActivePackage(){
  const s = [...selectedAddons].sort().join(",");
  for(const[k,v] of Object.entries(PACKAGES)){
    if([...v].sort().join(",")===s) return k;
  }
  return "individuell";
}

function buildBasicPrompt(){
  const pri=TOOLS.find(x=>x.id===setupData.primary);
  const role=ROLES.find(r=>r.id===profile.role)?.label||profile.roleFree||"Mitarbeiter*in";
  const ucs=profile.useCases.map(id=>USE_CASES.find(u=>u.id===id)?.label).filter(Boolean);
  const expL={none:"Ich bin KI-Einsteiger",some:"Ich habe KI ein paar Mal probiert",regular:"Ich nutze KI regelm\u00e4\u00dfig"};
  const styL={point:"knappe Bullet Points",structured:"strukturierte Antworten mit Erkl\u00e4rung",detailed:"ausf\u00fchrliche Antworten mit Kontext und Hintergr\u00fcnden"};
  const lrnL={facts:"Stichpunkte und Fakten",examples:"konkrete Beispiele und Vorlagen",stepbystep:"Schritt-f\u00fcr-Schritt-Anleitungen"};
  const lvl=profile.aiExp==="none"?"\u00dcberfordere mich nicht, erkl\u00e4re einfach":profile.aiExp==="regular"?"Fordere mich ruhig, zeig mir Profi-Tipps":"Passe dich an mein Level an";

  let p = `=== SYSTEM-SETUP: ${setupData.name||role} bei HORSCH ===

Speichere dieses Profil dauerhaft als deine Arbeitsgrundlage.
Das bin ICH \u2014 nicht nur meine Aufgaben:

\u25B8 Wer: ${role} bei HORSCH Maschinen (Landmaschinenhersteller, 2000 MA, Schwandorf/Bayern)
\u25B8 Wie ich arbeite: ${styL[profile.workStyle]||"strukturiert"}
\u25B8 Wie ich lerne: ${lrnL[profile.learnStyle]||"Beispiele"}
\u25B8 Wo ich stehe: ${expL[profile.aiExp]||""}
\u25B8 Meine Sprache: Deutsch${profile.language==="mixed"?" + Englisch":""}

Meine Hauptaufgaben: ${ucs.join(", ")}.
Konkret diese Woche: ${profile.task}

=== INSTALLATIONS-ANWEISUNGEN ===

1. \u00dcbernimm dieses Profil als Custom Instruction / Ged\u00e4chtnis
2. Frag mich 2\u20133 pers\u00f6nliche Fragen (nicht nur Aufgaben \u2014 auch was mich motiviert, was mich nervt, wie ich ticke)
3. Erstelle daraus einen System-Prompt den ich hinterlegen kann
4. Zeig mir an meiner konkreten Aufgabe was du kannst
5. Schlage 3 Funktionen vor die ich noch nicht kenne

${lvl}. Antworte auf Deutsch.`;
  return p;
}

function buildFullPrompt(){
  let p = buildBasicPrompt();

  const active = ADDONS.filter(a=>selectedAddons.has(a.id));
  if(active.length){
    p += "\n\n=== ADD-ONS ===\n";
    CLUSTERS.forEach(cl=>{
      const items = active.filter(a=>a.cluster===cl.id);
      if(items.length){
        p += "\n--- " + cl.name + " ---\n";
        items.forEach(a=>{ p += "\n" + a.emoji + " " + a.name + ":\n" + a.prompt + "\n"; });
      }
    });
  }

  return p;
}
